<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Autonomous Vehicle – Command Console</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
html,body{
  margin:0;
  background:#030712;
  font-family:'Rajdhani', monospace;
  color:#00eaff;
  height:100%;
  overflow:hidden;
}

/* Console layout */
#console{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#07152e 0%,#02050f 65%);
  display:flex;
  flex-direction:column;
}

/* Header */
#header{
  padding:16px 24px;
  border-bottom:1px solid #00eaff;
  display:flex;
  justify-content:space-between;
  font-family:'Orbitron', sans-serif;
  letter-spacing:2px;
}

/* Main grid */
#main{
  flex:1;
  display:grid;
  grid-template-columns:1.3fr 1fr;
}

/* Map panel */
#map{
  position:relative;
  padding:16px;
}
#map iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:8px;
  box-shadow:0 0 25px rgba(0,255,255,.25);
}

/* Info panel */
#info{
  padding:32px;
}
h3{
  font-family:'Orbitron', sans-serif;
  letter-spacing:2px;
  margin-top:0;
}
.controls{
  margin-top:28px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
button{
  padding:14px 18px;
  background:transparent;
  border:1px solid #00eaff;
  color:#00eaff;
  font-family:'Orbitron', sans-serif;
  letter-spacing:2px;
  cursor:pointer;
  border-radius:6px;
  transition:0.3s;
}
button:hover{
  background:#00eaff;
  color:#000;
}

/* Footer */
#footer{
  border-top:1px solid #00eaff;
  padding:14px;
  display:flex;
  justify-content:space-around;
  font-family:'Orbitron', sans-serif;
}
</style>
</head>
<body>

<div id="console">
  <div id="header">
    <span>AUTONOMOUS VEHICLE — COMMAND CONSOLE</span>
    <span>STATUS: NOMINAL</span>
  </div>

  <div id="main">
    <div id="map">
      <iframe src="https://www.google.com/maps?q=Manhattan&output=embed" loading="lazy"></iframe>
    </div>

    <div id="info">
      <h3>SYSTEM ACCESS</h3>
      <p>Select subsystem to engage.</p>
      <div class="controls">
        <button onclick="location.href='cyber2.html'">CYBER</button>
        <button onclick="location.href='Medical.html'">MEDICAL</button>
        <button onclick="location.href='route.html'">ROUTE</button>
        <button onclick="location.href='systems.html'">SYSTEMS</button>
      </div>
    </div>
  </div>

  <footer>
    <span>AI CORE: ONLINE</span>
    <span>SECURITY: ACTIVE</span>
  </footer>
</div>

</body>
</html>
