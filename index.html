
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Autonomous Bio-Cyber Neural HUD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --cyan:#00eaff;
  --green:#00ff99;
  --yellow:#ffd000;
  --red:#ff3b3b;
  --bg:#020305;
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:var(--cyan);
  font-family:'Rajdhani',sans-serif;
}

/* ===================================================== */
/* CRT OVERLAY */
/* ===================================================== */

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:50;
  pointer-events:none;

  background:
    linear-gradient(rgba(255,255,255,.02) 50%, rgba(0,0,0,.18) 50%),
    linear-gradient(90deg,
      rgba(255,0,0,.04),
      rgba(0,255,0,.02),
      rgba(0,0,255,.04));

  background-size:100% 4px, 3px 100%;
  mix-blend-mode:screen;
}

/* ===================================================== */
/* MAP */
/* ===================================================== */

#map{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
  filter:grayscale(1) brightness(.25) contrast(1.3);
}

#map iframe{
  width:100%;
  height:100%;
  border:none;
  transform:scale(1.08);
  pointer-events:none;
}

/* ===================================================== */
/* ATMOSPHERIC OVERLAY */
/* ===================================================== */

#overlay{
  position:fixed;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at center,
    rgba(0,255,255,.10),
    rgba(0,0,0,.96) 75%);
}

/* ===================================================== */
/* GRID */
/* ===================================================== */

#grid{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,.04) 1px, transparent 1px);

  background-size:40px 40px;
}

/* ===================================================== */
/* SCANNER */
/* ===================================================== */

#scanner{
  position:fixed;
  inset:0;
  z-index:3;
  pointer-events:none;
}

.scanline{
  position:absolute;
  width:100%;
  height:2px;
  background:
    linear-gradient(to right,
    transparent,
    rgba(0,255,255,.8),
    transparent);

  animation:scan 5s linear infinite;
}

@keyframes scan{
  0%{top:-5%;}
  100%{top:105%;}
}

/* ===================================================== */
/* RADAR RING */
/* ===================================================== */

#radar{
  position:absolute;
  width:600px;
  height:600px;
  border-radius:50%;
  border:1px solid rgba(0,255,255,.12);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;

  animation:rotate 40s linear infinite;
}

#radar::before,
#radar::after{
  content:"";
  position:absolute;
  inset:10%;
  border-radius:50%;
  border:1px solid rgba(0,255,255,.08);
}

@keyframes rotate{
  from{transform:translate(-50%,-50%) rotate(0deg);}
  to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* ===================================================== */
/* CORE */
/* ===================================================== */

#core{
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle,
    rgba(0,255,255,.30),
    rgba(0,255,255,.04) 60%,
    transparent 75%);

  border:1px solid rgba(0,255,255,.25);

  box-shadow:
    0 0 60px rgba(0,255,255,.25),
    inset 0 0 40px rgba(0,255,255,.15);

  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%,100%{
    transform:translate(-50%,-50%) scale(1);
  }

  50%{
    transform:translate(-50%,-50%) scale(1.05);
  }
}

#core h1{
  margin:0;
  font-size:18px;
  font-family:'Orbitron';
  letter-spacing:2px;
}

#trust{
  font-size:28px;
  margin-top:8px;
  font-family:'Orbitron';
}

/* ===================================================== */
/* PANELS */
/* ===================================================== */

.zone{
  position:absolute;
  width:290px;
  padding:14px;

  background:rgba(0,0,0,.38);

  border:
    1px solid rgba(0,255,255,.18);

  backdrop-filter:blur(12px);

  box-shadow:
    0 0 25px rgba(0,255,255,.05);

  z-index:20;
}

.panelTitle{
  font-family:'Orbitron';
  font-size:12px;
  letter-spacing:2px;
  margin-bottom:10px;
  opacity:.8;
}

/* PANEL POSITIONS */

#bioZone{top:8%;left:4%;}
#cyberZone{top:8%;right:4%;}
#neuralZone{bottom:8%;right:4%;}
#logZone{
  bottom:8%;
  left:4%;
  height:240px;
  overflow:hidden;
}

/* ===================================================== */
/* BUTTONS */
/* ===================================================== */

button{
  width:100%;
  margin-top:8px;
  padding:12px;

  color:var(--cyan);
  background:transparent;

  border:1px solid var(--cyan);

  cursor:pointer;

  font-family:'Orbitron';

  transition:.3s;

  clip-path:
    polygon(10% 0,
    100% 0,
    100% 70%,
    90% 100%,
    0 100%,
    0 30%);
}

button:hover{
  background:rgba(0,255,255,.10);

  box-shadow:
    0 0 20px rgba(0,255,255,.35);
}

/* ===================================================== */
/* NODES */
/* ===================================================== */

.node{
  position:absolute;
  z-index:20;
  font-size:12px;
  opacity:.9;
  text-shadow:0 0 10px rgba(0,255,255,.35);
}

#bioNode{
  top:5%;
  left:50%;
  transform:translateX(-50%);
}

#netNode{
  top:50%;
  left:4%;
}

#rfNode{
  top:50%;
  right:4%;
}

#devNode{
  bottom:4%;
  left:50%;
  transform:translateX(-50%);
}

/* ===================================================== */
/* ALERT */
/* ===================================================== */

#alertBanner{
  position:fixed;
  top:0;
  left:0;
  right:0;

  padding:10px;

  background:rgba(255,0,0,.12);

  border-bottom:1px solid rgba(255,0,0,.35);

  text-align:center;

  font-family:'Orbitron';

  letter-spacing:3px;

  z-index:100;

  opacity:0;

  transition:.4s;
}

/* ===================================================== */
/* LOGS */
/* ===================================================== */

#logs{
  font-size:13px;
  line-height:1.4;
  height:190px;
  overflow:hidden;
}

.log{
  margin-bottom:5px;
  opacity:.85;
}

/* ===================================================== */
/* BLINK */
/* ===================================================== */

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,50%{opacity:1;}
  51%,100%{opacity:.2;}
}

</style>
</head>

<body>

<!-- MAP -->
<div id="map">
  <iframe src="https://www.google.com/maps?q=Manhattan&output=embed"></iframe>
</div>

<div id="overlay"></div>
<div id="grid"></div>

<div id="scanner">
  <div class="scanline"></div>
</div>

<div id="radar"></div>

<!-- ALERT -->
<div id="alertBanner">
  THREAT DETECTED
</div>

<!-- CORE -->
<div id="core">
  <h1>AI CORE</h1>
  <div id="trust">100%</div>
</div>

<!-- BIO -->
<div class="zone" id="bioZone">
  <div class="panelTitle">BIO SYSTEM</div>

  HEART RATE:
  <span id="heart">--</span><br>

  RESPIRATION:
  <span id="resp">--</span><br>

  STRESS:
  <span id="stress">--</span><br><br>

  <button onclick="mode('bio')">SCAN VITALS</button>
  <button onclick="addLog('BIO DIAGNOSTIC COMPLETE')">RUN DIAGNOSTIC</button>
</div>

<!-- CYBER -->
<div class="zone" id="cyberZone">
  <div class="panelTitle">CYBER SYSTEM</div>

  NETWORK:
  <span id="net">--</span><br>

  PACKETS:
  <span id="packets">--</span><br>

  THREAT:
  <span id="threat">--</span><br><br>

  <button onclick="mode('threat')">SCAN NETWORK</button>
  <button onclick="addLog('RF ANALYSIS COMPLETE')">ANALYZE RF</button>
  <button onclick="addLog('SIGNAL TRACE ACQUIRED')">TRACE SIGNAL</button>
</div>

<!-- NEURAL -->
<div class="zone" id="neuralZone">
  <div class="panelTitle">NEURAL SYSTEM</div>

  EEG:
  <span id="eeg">--</span><br>

  EMG:
  <span id="emg">--</span><br>

  STATUS:
  <span id="status">--</span><br><br>

  <button onclick="mode('sync')">NEURAL CHECK</button>
  <button onclick="addLog('NEURAL SYNCHRONIZATION STABLE')">SYNCHRONIZE</button>
</div>

<!-- LOGS -->
<div class="zone" id="logZone">
  <div class="panelTitle">SYSTEM LOG</div>
  <div id="logs"></div>
</div>

<!-- NODES -->
<div class="node" id="bioNode">
  BIO<br>
  <span id="bioVal">--</span>
</div>

<div class="node" id="netNode">
  NET<br>
  <span id="netVal">--</span>
</div>

<div class="node" id="rfNode">
  RF<br>
  <span id="rfVal">--</span>
</div>

<div class="node" id="devNode">
  DEVICES<br>
  <span id="devVal">--</span>
</div>

<script>

/* ===================================================== */
/* HELPERS */
/* ===================================================== */

function r(min,max){
  return Math.random()*(max-min)+min;
}

const logs=document.getElementById("logs");

function addLog(msg){

  const div=document.createElement("div");
  div.className="log";

  const time=new Date().toLocaleTimeString();

  div.textContent=
    "["+time+"] "+msg;

  logs.prepend(div);

  while(logs.children.length > 12){
    logs.removeChild(logs.lastChild);
  }
}

/* ===================================================== */
/* ELEMENTS */
/* ===================================================== */

const heart=document.getElementById("heart");
const resp=document.getElementById("resp");
const stress=document.getElementById("stress");

const net=document.getElementById("net");
const packets=document.getElementById("packets");
const threat=document.getElementById("threat");

const eeg=document.getElementById("eeg");
const emg=document.getElementById("emg");
const status=document.getElementById("status");

const trust=document.getElementById("trust");

const bioVal=document.getElementById("bioVal");
const netVal=document.getElementById("netVal");
const rfVal=document.getElementById("rfVal");
const devVal=document.getElementById("devVal");

const alertBanner=document.getElementById("alertBanner");

/* ===================================================== */
/* MODES */
/* ===================================================== */

let systemMode="normal";

function mode(m){

  systemMode=m;

  addLog("MODE SWITCHED: "+m.toUpperCase());

  if(m==="threat"){
    alertBanner.style.opacity=1;
    document.body.style.filter="contrast(1.2)";
  }

  if(m==="sync"){
    alertBanner.style.opacity=0;
    document.body.style.filter="hue-rotate(40deg)";
  }

  if(m==="bio"){
    alertBanner.style.opacity=0;
    document.body.style.filter="none";
  }

}

/* ===================================================== */
/* TELEMETRY LOOP */
/* ===================================================== */

setInterval(()=>{

  let threatLevel=Math.floor(r(0,100));

  if(systemMode==="threat"){
    threatLevel=Math.floor(r(70,100));
  }

  const heartRate=Math.floor(r(60,120));
  const respiration=Math.floor(r(10,22));

  const stressStates=["LOW","MEDIUM","HIGH"];
  const eegStates=["FOCUSED","ACTIVE","DROWSY"];
  const emgStates=["RELAXED","TENSE","ACTIVE"];

  heart.textContent=heartRate;
  resp.textContent=respiration;
  stress.textContent=
    stressStates[Math.floor(r(0,3))];

  net.textContent=Math.floor(r(40,100))+"%";

  packets.textContent=
    Math.floor(r(100,900));

  threat.textContent=
    threatLevel+"%";

  eeg.textContent=
    eegStates[Math.floor(r(0,3))];

  emg.textContent=
    emgStates[Math.floor(r(0,3))];

  status.textContent=
    heartRate > 100 ?
    "ELEVATED" :
    "NOMINAL";

  trust.textContent=
    (100 - Math.floor(threatLevel/2))+"%";

  bioVal.textContent=
    heartRate+" BPM";

  netVal.textContent=
    Math.floor(r(20,100));

  rfVal.textContent=
    Math.floor(r(1,10));

  devVal.textContent=
    Math.floor(r(2,8));

  /* THREAT COLORS */

  if(threatLevel < 40){
    threat.style.color="#00ff99";
  }

  else if(threatLevel < 70){
    threat.style.color="#ffd000";
  }

  else{
    threat.style.color="#ff3b3b";

    addLog("WARNING: THREAT SPIKE DETECTED");

    alertBanner.style.opacity=1;

    setTimeout(()=>{
      alertBanner.style.opacity=0;
    },2000);
  }

},1200);

/* ===================================================== */
/* AUTO LOG EVENTS */
/* ===================================================== */

const autoLogs=[
  "RF INTERFERENCE DETECTED",
  "NEURAL LINK STABLE",
  "ESP32 NODE CONNECTED",
  "PACKET SURGE DETECTED",
  "AI TRUST MATRIX UPDATED",
  "BIO SIGNAL SYNCHRONIZED",
  "THERMAL SENSOR ONLINE",
  "EXTERNAL DEVICE IDENTIFIED",
  "SCAN GRID ACTIVE",
  "SIGNAL TRIANGULATION COMPLETE"
];

setInterval(()=>{

  const msg=
    autoLogs[
      Math.floor(Math.random()*autoLogs.length)
    ];

  addLog(msg);

},3500);

/* ===================================================== */
/* STARTUP */
/* ===================================================== */

addLog("AI CORE INITIALIZED");
addLog("SYSTEM BOOT COMPLETE");
addLog("BIO-CYBER LINK ACTIVE");

</script>

</body>
</html>
